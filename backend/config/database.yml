default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  url: <%= ENV.fetch("DATABASE_URL", "postgres://resourcemonitor:resourcemonitor@localhost:5432/resourcemonitor_development") %>

test:
  <<: *default
  url: <%= ENV.fetch("DATABASE_URL", "postgres://resourcemonitor:resourcemonitor@localhost:5432/resourcemonitor_test") %>

production:
  <<: *default
  url: <%= ENV["DATABASE_URL"] %>
