name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-backend:
    name: Lint (Backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: backend
      - run: bundle exec rubocop
        working-directory: backend

  lint-frontend:
    name: Lint (Frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend
      - run: npm run format:check
        working-directory: frontend

  test-backend:
    name: Test (Backend)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: resourcemonitor
          POSTGRES_PASSWORD: resourcemonitor
          POSTGRES_DB: resourcemonitor_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: backend
      - name: Setup database
        env:
          DATABASE_URL: postgres://resourcemonitor:resourcemonitor@localhost:5432/resourcemonitor_test
          RAILS_ENV: test
        run: bundle exec rails db:create db:migrate
        working-directory: backend
      - name: Run RSpec
        env:
          DATABASE_URL: postgres://resourcemonitor:resourcemonitor@localhost:5432/resourcemonitor_test
          RAILS_ENV: test
          REDIS_URL: redis://localhost:6379/0
        run: bundle exec rspec
        working-directory: backend

  build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: docker build -f backend/Dockerfile.dev backend/
      - run: docker build -f frontend/Dockerfile.dev frontend/

  audit-backend:
    name: Security Audit (Backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: backend
      - run: bundle exec bundler-audit check --update
        working-directory: backend
      - run: bundle exec brakeman -q --no-pager
        working-directory: backend
